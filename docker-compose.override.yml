services:

  backend:
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ./backend
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    volumes:
      # TODO: remove once coverage is done locally
      - ./backend/htmlcov:/app/htmlcov
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      ENV_TEMPLATES_DIR: "app/env-templates"
      ENV_INSTANCES_DIR: "/agent-environments"
      # Host path for agent environments (used by docker-compose volume mounts)
      HOST_AGENT_ENVIRONMENTS_DIR: "${PWD}/backend/agent-environments"
      # Test database connection (separate DB for pytest)
      TEST_DB_SERVER: "db"
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: "app_test"
      TEST_DB_USER: "${POSTGRES_USER}"
      TEST_DB_PASSWORD: "${POSTGRES_PASSWORD}"

  db:
    image: postgres:17
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - "5476:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
      - ./scripts/create-test-db.sh:/docker-entrypoint-initdb.d/create-test-db.sh
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    networks:
      - default

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  adminer:
    image: adminer
    restart: "no"
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    ports:
      - "8099:8080"

  frontend:
    restart: "no"
    ports:
      - "5173:80"
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
  app-db-data: