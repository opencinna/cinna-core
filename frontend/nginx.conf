server {
  listen 80;

  # Docker's embedded DNS — lets us defer upstream resolution to request time
  # so nginx doesn't fail at startup if the backend container isn't ready yet.
  resolver 127.0.0.11 valid=30s ipv6=off;

  location /api/ {
    set $upstream http://backend:8000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Well-known discovery endpoints (must reach backend, not the SPA) ──
  # These URIs live at the origin root by spec (RFC 8615 / RFC 9728 / RFC 8414),
  # so they must be proxied explicitly. The production reverse proxy does the
  # same; these rules keep local docker-compose in parity when the frontend
  # container is the entry point on http://localhost/.

  location /.well-known/cinna-desktop {
    set $upstream http://backend:8000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /.well-known/oauth-protected-resource {
    set $upstream http://backend:8000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /.well-known/oauth-authorization-server {
    set $upstream http://backend:8000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
